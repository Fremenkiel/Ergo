services:
  db:
    container_name: db
    image: postgres:18.4
    command: postgres -c wal_level=logical
    restart: always
    env_file:
      - ../.env
      - ../.env.development.local
    ports:
      - '5432:5432'
    volumes:
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Gate dependents on real readiness. The postgres entrypoint starts PG,
      # runs init, then restarts it — `up -d` returning does NOT mean ready.
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1024M

  clickhouse:
    container_name: clickhouse
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: always
    environment:
      CLICKHOUSE_DB: audit_log
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - '8123:8123'
      - '9000:9000'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:8123/ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 2G
